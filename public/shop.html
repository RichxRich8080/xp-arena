<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Armory • XP ARENA</title>
    <link rel="stylesheet" href="css/rebirth.css">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <style>
        .shop-container {
            padding: 8rem 2rem 10rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .shop-header {
            text-align: center;
            margin-bottom: 5rem;
        }

        .shop-header h1 {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .balance-hub {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            background: var(--glass-highlight);
            border: 1px solid var(--photon);
            padding: 0.8rem 2rem;
            border-radius: 100px;
            margin-top: 1rem;
            box-shadow: 0 0 20px var(--photon-glow);
        }

        .balance-hub i {
            color: var(--photon);
            font-size: 1.2rem;
        }

        .balance-hub span {
            font-family: 'Clash Display', sans-serif;
            font-weight: 700;
            color: var(--stardust);
        }

        .shop-grid-wrap {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            position: relative;
        }

        /* Maxim Character Stylings */
        .agent-mentor-shop {
            position: sticky;
            top: 8rem;
            height: fit-content;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .agent-character {
            width: 100%;
            filter: drop-shadow(0 0 30px rgba(191, 0, 255, 0.4));
            animation: quartermaster-breathe 5s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes quartermaster-breathe {

            0%,
            100% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 0 20px rgba(191, 0, 255, 0.3));
            }

            50% {
                transform: translateY(-10px) scale(1.01);
                filter: drop-shadow(0 0 40px rgba(191, 0, 255, 0.6));
            }
        }

        .acquisition-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, var(--photon) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.5s;
        }

        .acquisition-glow.active {
            animation: glow-burst 1s ease-out forwards;
        }

        @keyframes glow-burst {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

            50% {
                opacity: 0.4;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.5);
            }
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        /* Item Cards (Enhanced Pulse) */
        .shop-item-card {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
        }

        .shop-item-card.purchase-glitch {
            animation: purchase-glitch 600ms steps(2, end);
        }

        @keyframes purchase-glitch {
            0% { transform: translate(0); filter: hue-rotate(0deg); }
            20% { transform: translate(-3px, 1px); filter: hue-rotate(25deg); }
            40% { transform: translate(3px, -1px); filter: hue-rotate(-20deg); }
            60% { transform: translate(-2px, -1px); filter: hue-rotate(35deg); }
            80% { transform: translate(2px, 1px); filter: hue-rotate(-15deg); }
            100% { transform: translate(0); filter: hue-rotate(0deg); }
        }

        .rarity-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }

        .rarity-legendary {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border: 1px solid #ffd700;
        }

        .rarity-epic {
            background: rgba(191, 0, 255, 0.1);
            color: #bf00ff;
            border: 1px solid #bf00ff;
        }

        .rarity-rare {
            background: rgba(0, 229, 255, 0.1);
            color: #00e5ff;
            border: 1px solid #00e5ff;
        }

        .module-visual {
            height: 180px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .module-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .module-visual i {
            font-size: 3.5rem;
            color: var(--photon);
            filter: drop-shadow(0 0 10px var(--photon-glow));
        }

        .spec-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .spec-tag {
            font-size: 0.6rem;
            background: var(--glass-highlight);
            border: 1px solid var(--glass-border);
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--stardust-muted);
        }

        .shop-item-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .price-tag {
            font-family: 'Clash Display', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--stardust);
        }

        @media (max-width: 980px) {
            .shop-grid-wrap {
                grid-template-columns: 1fr;
            }

            .agent-mentor-shop {
                position: relative;
                top: auto;
                max-width: 420px;
                margin: 0 auto;
            }
        }

        @media (max-width: 600px) {
            .shop-header h1 {
                font-size: 2.5rem;
            }

            .shop-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="page-rebirth">
    <div class="hud-scanline"></div>
    <div class="hud-noise"></div>
    <div class="shop-container">
        <header class="shop-header">
            <span class="section-label" style="letter-spacing: 0.5rem; margin-bottom: 2rem;">Hardware & Neural
                Procurement</span>
            <h1 class="clash">THE<br><span class="text-photon">ARMORY</span></h1>

            <div class="balance-hub">
                <i class="fas fa-satellite-dish" style="animation: pulse-icon 2s infinite;"></i>
                <span><span id="shop-balance" class="text-photon">0</span> AXP_CREDITS SECURED</span>
            </div>
        </header>

        <div class="shop-grid-wrap">
            <!-- Mentor Agent: Maxim -->
            <div class="agent-mentor-shop">
                <img src="assets/images/[CITYPNG.COM]Free Fire Garena Maxim Character - 800x800.png"
                    class="agent-character" alt="Maxim" id="mentorMaxim">
                <div class="pulse-card"
                    style="margin-top: -2rem; padding: 1.5rem; width: 100%; border-color: var(--nebula); border-top: 2px solid #bf00ff; text-align: center; background: rgba(191, 0, 255, 0.05);">
                    <div class="section-label" style="margin-bottom: 0.5rem; color: #bf00ff;">ARMORY_QUARTERMASTER:
                        MAXIM</div>
                    <div id="maximDialogue"
                        style="font-size: 0.75rem; color: var(--stardust-muted); font-style: italic;">"Hardware check
                        complete. The armory is open for extraction."</div>
                </div>
                <div class="acquisition-glow" id="shopGlow"></div>
            </div>

            <div id="shop-items-grid" class="shop-grid">
                <!-- Dynamic Injection via shop.js -->
            </div>
        </div>

        <div
            style="margin-top: 6rem; text-align: center; opacity: 0.6; font-size: 0.85rem; color: var(--stardust-muted);">
            <i class="fas fa-info-circle"></i> AXP values fluctuate based on global supply. All modules are
            non-refundable once synced.
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/dom-utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/shop.js"></script>
</body>

</html>
